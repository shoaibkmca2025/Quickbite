<script>
        // Simple Micro-interactions
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const divs = themeToggle.querySelectorAll('div');
            divs.forEach(div => {
                div.classList.toggle('bg-white');
                div.classList.toggle('shadow-sm');
            });
        });

        // Add ripple-like effect on button clicks
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('mousedown', function() {
                this.classList.add('brightness-95');
            });
            el.addEventListener('mouseup', function() {
                this.classList.remove('brightness-95');
            });
            el.addEventListener('mouseleave', function() {
                this.classList.remove('brightness-95');
            });
        });
    </script>
